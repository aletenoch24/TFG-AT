{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title mb-0">Reportar una Incidencia</h3>
            </div>
            <div class="card-body">
                <p class="card-text text-muted">Utiliza este formulario para notificar una cancelación de clase, cambio de aula u otro aviso importante.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="aula" class="form-label">Aula Afectada</label>
                        <input type="text" class="form-control" id="aula" name="aula" placeholder="Ej: H1.10" required>
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Tipo de Aviso</label>
                        <input type="text" class="form-control" id="estado" name="estado" placeholder="Ej: Clase cancelada" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hora" class="form-label">Hora de la Clase</label>
                            <select class="form-select" id="hora" name="hora" required>
                                <option value="" disabled selected>Selecciona una hora</option>
                                <option value="08:30">8:30</option>
                                <option value="10:40">10:40</option>
                                <option value="12:40">12:40</option>
                                <option value="15:30">15:30</option>
                                <option value="17:40">17:40</option>
                                <option value="19:40">19:40</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fecha" class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" name="fecha" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Enviar Incidencia</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
