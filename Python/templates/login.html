<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            
            <!-- Mensajes Flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-danger text-center" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Formulario de Login -->
            <div id="caja-login">
                <h3 class="card-title text-center mb-3">Iniciar Sesión</h3>
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuario</label>
                        <input type="text" class="form-control" name="usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                </form>
                <p class="text-center mt-3 small">
                    ¿No tienes cuenta? <a href="#" onclick="cambiarFormulario()">Regístrate aquí</a>
                </p>
            </div>

            <!-- Formulario de Registro -->
            <div id="caja-registro" style="display: none;">
                <h3 class="card-title text-center mb-3">Crear Cuenta</h3>
                <form action="{{ url_for('registro') }}" method="POST">
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" name="usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Registrarme</button>
                    </div>
                </form>
                <p class="text-center mt-3 small">
                    ¿Ya tienes cuenta? <a href="#" onclick="cambiarFormulario()">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/web.js') }}"></script>
</body>
</html>
